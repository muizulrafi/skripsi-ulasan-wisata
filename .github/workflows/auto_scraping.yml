name: Auto Scraping & Analisis Ulasan

on:
  schedule:
    # Jam 06:00 WIB = 23:00 UTC (hari sebelumnya)
    # Jam 18:00 WIB = 11:00 UTC
    - cron: '0 23 * * *'
  workflow_dispatch:
    branches: [master]

jobs:
  scraping-dan-analisis:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas playwright nltk sastrawi scikit-learn gensim openpyxl

      - name: Install Playwright Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Download NLTK data
        run: |
          python -c "import nltk; nltk.download('punkt'); nltk.download('stopwords')"

      - name: 1 - Scraping ulasan baru
        run: python scripts/01_scraping_maps.py
        continue-on-error: true

      - name: 2 - Auto Labelling
        run: python scripts/02_labelling.py
        continue-on-error: true

      - name: 3 - Generate Lembar Anotator
        run: python scripts/03_annotator.py
        continue-on-error: true

      - name: 4 - Preprocessing
        run: python scripts/04_preprocessing.py
        continue-on-error: true

      - name: 5 - Analisis SVM
        run: python scripts/06_svm_model.py
        continue-on-error: true

      - name: 6 - Analisis LDA
        run: python scripts/07_lda_model.py
        continue-on-error: true

      - name: 7 - Distribusi Topik
        run: python scripts/08_distribusi_topik.py
        continue-on-error: true

      - name: 8 - Coherence Score
        run: python scripts/09_coherence.py
        continue-on-error: true

      - name: Commit dan push hasil baru
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add data/
          git diff --staged --quiet || git commit -m "Auto update: scraping + analisis $(date +'%Y-%m-%d %H:%M WIB')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


